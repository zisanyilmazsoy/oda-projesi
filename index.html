<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Odam</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: #000;
  }
  #canvas3d {
    width: 100%;
    height: 100%;
    display: block;
  }
  #info-box {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 20, 20, 0.9);
    color: #fff;
    padding: 20px 28px;
    border-radius: 16px;
    max-width: 480px;
    width: 85%;
    font-size: 19px;
    line-height: 1.5;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: none;
    z-index: 10;
  }
  #info-box.show {
    display: block;
  }
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>
<div id="info-box"></div>

<script type="module">
  import { Application } from 'https://unpkg.com/@splinetool/runtime/build/runtime.js';

  const canvas = document.getElementById('canvas3d');
  const app = new Application(canvas);

  app.load('https://prod.spline.design/bAghOHZ3b2Y7KGn8/scene.splinecode').then(() => {

    const messages = {
      "Gitar": "Keman olmadığı için gitar koydum ama normalde aktif olarak keman çalıyorum.",
      "cay": "Herkes kahve falan der ama ben sonuna kadar çaycıyım (hatta kaçak çaycıyım).",
      "laptop": "Bilgisayar mühendisi olduğum için bilgisayarı böbreğim gibi kendimle beraber her yere götürüyorum :)",
      "kitap": "Kitap okumayı çok seviyorum, özellikle Rus romanlarını. Çünkü son parasını kira yerine boş şeylere veren başrollerde kendimden bir parça buluyorum.",
      "pilates": "Spor yapmaktan nefret ederim.",
      "hali": "Yerlerde sürünmeyi çok severim, her anlamda."
    };

    const box = document.getElementById('info-box');

    app.addEventListener('mouseDown', (e) => {
      const name = e.target ? e.target.name : null;
      console.log('Tıklanan nesnenin ismi:', name);

      if (name && messages[name]) {
        box.textContent = messages[name];
        box.classList.add('show');
      } else {
        box.classList.remove('show');
      }
    });
  });
</script>

</body>
</html>
